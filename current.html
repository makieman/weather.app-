<main class="container">
  <section class="row current-location">
    <!-- Left: City & Temperature -->
    <article class="col current-city" id="current-city">
      <div class="search-city">
        <span class="city">Kyiv</span>
        <span class="current-weather">
          <img src="images/sun.png" alt="sunny" width="30px" />
        </span>
      </div>
      <div>
        <span class="temp">12</span>
        <span class="units">
          <a href="#" id="celsius">°C</a> |
          <a href="#" id="fahrenheit">°F</a>
        </span>
      </div>
      <div class="current-date">
        <span class="day" id="day">Sunday</span>
        <span class="time" id="time"></span>
      </div>
    </article>

    <!-- Right: Weather Details -->
    <aside class="col-4 current-location-details">
      <p>Precipitation: <span class="precipitation">1%</span></p>
      <p>Humidity: <span class="humidity">52%</span></p>
      <p>Wind: <span class="wind-speed">5km/h</span></p>
    </aside>
  </section>
</main>
